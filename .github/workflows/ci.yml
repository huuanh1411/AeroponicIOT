name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AeroponicIOT.sln

      - name: Build
        run: dotnet build AeroponicIOT.sln --configuration Release --no-restore

      - name: Verify Formatting
        run: dotnet format style AeroponicIOT.sln --verify-no-changes --severity error --no-restore

      - name: Test
        run: dotnet test AeroponicIOT.sln --configuration Release --no-build --verbosity normal

      - name: Security Audit (NuGet)
        run: dotnet list AeroponicIOT.sln package --vulnerable --include-transitive
