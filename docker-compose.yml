version: '3.8'
services:

  app:
    image: n3mnuonghn/aeroponiciot:1.0.0
    container_name: aeroponiciot
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5062:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
    env_file:
      - .env
    restart: unless-stopped
