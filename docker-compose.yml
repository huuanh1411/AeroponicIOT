services:

  app:
    image: n3mnuonghn/aeroponiciot:1.0.0
    container_name: aeroponiciot
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5062:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Redis__Configuration=${REDIS_CONFIGURATION:-aeroponiciot-redis:6379}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=AeroponicIOT
      - JwtSettings__Audience=AeroponicIOT
      - JwtSettings__ExpirationMinutes=1440
      - MqttSettings__Host=${MQTT_HOST:-aeroponiciot-mqtt}
      - MqttSettings__Port=${MQTT_PORT:-1883}
      - MqttSettings__Username=${MQTT_ADMIN_USERNAME:-admin}
      - MqttSettings__Password=${MQTT_ADMIN_PASSWORD:-public}
      - MqttSettings__RequireClientAuthentication=${MQTT_REQUIRE_CLIENT_AUTH:-true}
      - MqttSettings__EnableTls=${MQTT_ENABLE_TLS:-false}
      - MqttSettings__TlsPort=${MQTT_TLS_PORT:-8883}
      - MqttSettings__DisablePlaintextEndpoint=${MQTT_DISABLE_PLAINTEXT:-false}
      - MqttSettings__EnforceTopicAcl=${MQTT_ENFORCE_TOPIC_ACL:-true}
      - MqttSettings__DeviceTopicPrefix=${MQTT_DEVICE_TOPIC_PREFIX:-devices}
      - MqttSettings__EnableZigbee2MqttBridge=${ZIGBEE2MQTT_ENABLED:-false}
      - MqttSettings__Zigbee2MqttTopicPrefix=${ZIGBEE2MQTT_TOPIC_PREFIX:-zigbee2mqtt}
      - MqttSettings__EnforceZigbeeTopicAcl=${ZIGBEE2MQTT_ENFORCE_TOPIC_ACL:-true}
      - MqttSettings__ZigbeeBridgeUsername=${ZIGBEE2MQTT_BRIDGE_USERNAME:-}
      - MqttSettings__ZigbeeBridgeClientId=${ZIGBEE2MQTT_BRIDGE_CLIENT_ID:-}
      - Provisioning__SharedKey=${PROVISIONING_SHARED_KEY}
      - Provisioning__ClaimCodeMinutes=10
      - EmailSettings__Enabled=${EMAIL_ENABLED:-false}
      - EmailSettings__SmtpHost=${SMTP_HOST:-smtp.gmail.com}
      - EmailSettings__SmtpPort=${SMTP_PORT:-587}
      - EmailSettings__SmtpUsername=${SMTP_USERNAME:-}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD:-}
      - EmailSettings__FromEmail=${FROM_EMAIL:-noreply@smartfarmiot.com}
      - EmailSettings__FromName=Smart Farm IoT System
      - OpenTelemetry__ServiceName=AeroponicIOT
      - OpenTelemetry__Tracing__SampleRatio=${OTEL_TRACE_SAMPLE_RATIO:-0.25}
      - OpenTelemetry__Otlp__Endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
      aeroponiciot-mqtt:
        condition: service_healthy
      aeroponiciot-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/ready"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aeroponiciot-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=AeroponicIOT_DB_P@ss123
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "AeroponicIOT_DB_P@ss123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  aeroponiciot-mqtt:
    image: emqx/emqx:5.4-latest
    container_name: aeroponiciot-mqtt
    environment:
      - EMQX_LOG__LEVEL=info
    ports:
      - "1883:1883"
      - "8883:8883"
      - "8084:8084"
      - "18083:18083"
    restart: unless-stopped
    healthcheck:
      test: emqx ctl status
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  aeroponiciot-redis:
    image: redis:7-alpine
    container_name: aeroponiciot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ‚îÄ‚îÄ Zigbee2MQTT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Enable this service (profile: zigbee) when a Zigbee USB coordinator is
  # connected to the host (e.g. /dev/ttyUSB0 for a CC2652-based dongle).
  #
  # Required environment variables (set in .env or override):
  #   ZIGBEE2MQTT_SERIAL_PORT   ‚Äì host path to the coordinator (e.g. /dev/ttyUSB0)
  #   MQTT_ADMIN_USERNAME       ‚Äì must match MqttSettings:Username in the app
  #   MQTT_ADMIN_PASSWORD       ‚Äì must match MqttSettings:Password in the app
  #
  # After starting with `docker compose --profile zigbee up`, also set:
  #   MqttSettings__EnableZigbee2MqttBridge=true  (ZIGBEE2MQTT_ENABLED=true)
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: aeroponiciot-zigbee2mqtt
    profiles:
      - zigbee
    depends_on:
      aeroponiciot-mqtt:
        condition: service_healthy
    volumes:
      - ./zigbee2mqtt-data:/app/data
    devices:
      - ${ZIGBEE2MQTT_SERIAL_PORT:-/dev/ttyUSB0}:${ZIGBEE2MQTT_SERIAL_PORT:-/dev/ttyUSB0}
    environment:
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://aeroponiciot-mqtt:1883
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=${MQTT_ADMIN_USERNAME:-admin}
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=${MQTT_ADMIN_PASSWORD:-public}
      - ZIGBEE2MQTT_CONFIG_MQTT_CLIENT_ID=${ZIGBEE2MQTT_BRIDGE_CLIENT_ID:-zigbee2mqtt-bridge}
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=${ZIGBEE2MQTT_SERIAL_PORT:-/dev/ttyUSB0}
      - ZIGBEE2MQTT_CONFIG_PERMIT_JOIN=false
      # Include ieee_address in every telemetry payload so the backend can use
      # the stable hardware EUI-64 as the device identifier instead of the
      # user-editable friendly name.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_INCLUDE_DEVICE_INFORMATION=true
    restart: unless-stopped

volumes:
  sqldata:
