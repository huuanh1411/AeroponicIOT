version: '3.8'
services:

  app:
    image: n3mnuonghn/aeroponiciot:1.0.0
    container_name: aeroponiciot
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5062:80"
      - "1883:1883"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Redis__Configuration=${REDIS_CONFIGURATION:-}
      - JwtSettings__SecretKey=${JWT_SECRET_KEY}
      - JwtSettings__Issuer=AeroponicIOT
      - JwtSettings__Audience=AeroponicIOT
      - JwtSettings__ExpirationMinutes=1440
      - MqttSettings__Port=1883
      - MqttSettings__Host=0.0.0.0
      - MqttSettings__Username=${MQTT_ADMIN_USERNAME:-}
      - MqttSettings__Password=${MQTT_ADMIN_PASSWORD:-}
      - MqttSettings__RequireClientAuthentication=${MQTT_REQUIRE_CLIENT_AUTH:-true}
      - MqttSettings__EnableTls=${MQTT_ENABLE_TLS:-false}
      - MqttSettings__TlsPort=${MQTT_TLS_PORT:-8883}
      - MqttSettings__DisablePlaintextEndpoint=${MQTT_DISABLE_PLAINTEXT:-false}
      - MqttSettings__ServerCertificatePath=${MQTT_SERVER_CERT_PATH:-}
      - MqttSettings__ServerCertificatePassword=${MQTT_SERVER_CERT_PASSWORD:-}
      - MqttSettings__RequireClientCertificate=${MQTT_REQUIRE_CLIENT_CERT:-false}
      - MqttSettings__AllowedClientCertificateIssuers__0=${MQTT_ALLOWED_CLIENT_CERT_ISSUER_0:-}
      - MqttSettings__AllowedClientCertificateThumbprints__0=${MQTT_ALLOWED_CLIENT_CERT_THUMBPRINT_0:-}
      - MqttSettings__EnforceTopicAcl=${MQTT_ENFORCE_TOPIC_ACL:-true}
      - MqttSettings__DeviceTopicPrefix=${MQTT_DEVICE_TOPIC_PREFIX:-devices}
      - Provisioning__SharedKey=${PROVISIONING_SHARED_KEY}
      - Provisioning__ClaimCodeMinutes=10
      - EmailSettings__Enabled=${EMAIL_ENABLED:-false}
      - EmailSettings__SmtpHost=${SMTP_HOST:-smtp.gmail.com}
      - EmailSettings__SmtpPort=${SMTP_PORT:-587}
      - EmailSettings__SmtpUsername=${SMTP_USERNAME:-}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD:-}
      - EmailSettings__FromEmail=${FROM_EMAIL:-noreply@smartfarmiot.com}
      - EmailSettings__FromName=Smart Farm IoT System
      - OpenTelemetry__ServiceName=AeroponicIOT
      - OpenTelemetry__Tracing__SampleRatio=${OTEL_TRACE_SAMPLE_RATIO:-0.25}
      - OpenTelemetry__Otlp__Endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aeroponiciot-redis
    profiles:
      - redis
    ports:
      - "6379:6379"
    restart: unless-stopped
