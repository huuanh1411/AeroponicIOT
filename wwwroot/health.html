<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sức khỏe hệ thống - Smart Farm IoT</title>
    <link rel="stylesheet" href="css/dashboard.css?v=20260306">
</head>
<body>
    <header>
        <h1>Sức khỏe hệ thống</h1>
        <div class="header-controls">
            <button class="btn-primary btn-soft-green" onclick="goBackToDashboard()">← Về bảng điều khiển</button>
            <span id="healthLastChecked">Lần kiểm tra cuối: Chưa bao giờ</span>
        </div>
    </header>

    <main>
        <section class="card">
            <h2>Trạng thái tổng quan</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Tổng quan</span>
                    <span id="healthStatus" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Cơ sở dữ liệu</span>
                    <span id="dbStatus" class="stat-value">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">MQTT Broker</span>
                    <span id="mqttStatus" class="stat-value">--</span>
                </div>
            </div>
            <p style="margin-top:1rem;">Phản hồi thành công cuối: <span id="healthTimestamp">Chưa bao giờ</span></p>
            <button class="btn-primary" onclick="loadHealth()">Làm mới ngay</button>
        </section>

        <section class="card">
            <h2>Chi tiết</h2>
            <pre id="healthRaw" style="background:#f8f9fa;padding:1rem;border-radius:4px;overflow:auto;max-height:300px;">Chưa có dữ liệu.</pre>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/health.js"></script>
</body>
</html>
