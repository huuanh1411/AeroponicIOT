<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm IoT - Đăng nhập</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #34d399 0%, #15803d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .btn {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #22c55e 0%, #166534 100%);
            color: white;
            margin: 10px 0;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: white;
            color: #16a34a;
            border: 2px solid #16a34a;
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .auth-toggle a {
            color: #16a34a;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #3c3;
        }

        .loading {
            display: none;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm" class="login-form">
            <div class="auth-header">
                <h1>🌱 Smart Farm IoT</h1>
                <p>Chào mừng bạn quay lại! Vui lòng đăng nhập để tiếp tục.</p>
            </div>

            <div class="error-message" id="loginError"></div>
            <div class="success-message" id="loginSuccess"></div>

            <form id="loginSubmit">
                <div class="form-group">
                    <label for="loginUsername">Tên đăng nhập</label>
                    <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Mật khẩu</label>
                    <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>
                </div>

                <button type="submit" class="btn btn-primary">Đăng nhập</button>
                <div class="loading" id="loginLoading">Đang đăng nhập...</div>
            </form>

            <div class="auth-toggle">
                Chưa có tài khoản? <a href="register.html">Đăng ký tại đây</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const API_URL = Auth.getApiBase();

        // Only redirect when the stored session is a valid JWT accepted by the API
        window.addEventListener('load', async () => {
            if (!Auth.getStoredToken()) {
                Auth.clearAuthStorage();
                return;
            }

            const valid = await Auth.verifyStoredSession();
            if (valid) {
                window.location.href = 'index.html';
            }
        });

        // Login
        document.getElementById('loginSubmit').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');

            if (!username || !password) {
                showError('loginError', 'Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu');
                return;
            }

            document.getElementById('loginLoading').style.display = 'block';
            document.getElementById('loginError').style.display = 'none';
            if (submitBtn) submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/authentication/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await readJsonResponse(response);

                if (response.status === 429) {
                    showError('loginError', getRateLimitMessage(response, data));
                    return;
                }

                const loginResult = Auth.extractLoginResult(data);
                if (response.ok && loginResult?.token) {
                    try {
                        Auth.saveAuthSession({
                            token: loginResult.token,
                            username: loginResult.username || username,
                            role: loginResult.role || 'Farmer',
                            userId: loginResult.userId
                        });
                    } catch {
                        showError('loginError', 'Phản hồi đăng nhập không hợp lệ. Vui lòng thử lại.');
                        return;
                    }

                    window.location.href = 'index.html';
                    return;
                }

                showError('loginError', parseLoginError(data, response.status));
            } catch (error) {
                showError('loginError', 'Không thể kết nối máy chủ. Vui lòng thử lại.');
                console.error('Login error:', error);
            } finally {
                document.getElementById('loginLoading').style.display = 'none';
                if (submitBtn) submitBtn.disabled = false;
            }
        });

        async function readJsonResponse(response) {
            const text = await response.text();
            if (!text) return null;
            try {
                return JSON.parse(text);
            } catch {
                return null;
            }
        }

        function getRateLimitMessage(response, data) {
            const retryAfter = response.headers.get('Retry-After');
            if (retryAfter) {
                const seconds = Number.parseInt(retryAfter, 10);
                if (!Number.isNaN(seconds) && seconds > 0) {
                    return `Quá nhiều lần thử. Vui lòng đợi ${seconds} giây rồi thử lại.`;
                }
            }
            if (data?.detail) return data.detail;
            if (data?.message || data?.Message) return data.message || data.Message;
            return 'Quá nhiều lần thử đăng nhập. Vui lòng đợi khoảng 1 phút rồi thử lại.';
        }

        function parseLoginError(data, status) {
            if (status === 401) {
                return data?.detail || 'Tên đăng nhập hoặc mật khẩu không đúng';
            }
            if (data?.detail) return data.detail;
            if (data?.message || data?.Message) return data.message || data.Message;
            if (data?.title && status === 400) return data.title;
            return 'Đăng nhập thất bại';
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }

        function showSuccess(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }
    </script>
</body>
</html>
