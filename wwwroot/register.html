<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - AeroponicIOT</title>
    <link rel="stylesheet" href="css/register.css">
</head>

<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>AeroponicIOT</h1>
                <p>Tạo tài khoản mới</p>
            </div>

            <form id="registerForm" class="register-form">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required placeholder="Nhập tên đăng nhập">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Nhập email">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required minlength="8"
                        placeholder="Ít nhất 8 ký tự, có chữ hoa, thường và số"
                        autocomplete="new-password">
                    <span class="field-hint">Tối thiểu 8 ký tự, gồm chữ hoa, chữ thường và chữ số (vd: TestPass1)</span>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required
                        placeholder="Nhập lại mật khẩu">
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <p class="field-hint role-note">Tài khoản đăng ký mới được gán vai trò <strong>Nông dân</strong>.</p>

                <div id="successMessage" class="success-message" style="display: none;">
                    <span id="successText"></span>
                </div>

                <div id="errorMessage" class="error-message-box" style="display: none;">
                    <span id="errorText"></span>
                </div>

                <button type="submit" class="btn-register">Đăng ký</button>
            </form>

            <div class="register-footer">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a></p>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD_RULE = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
        const FIELD_ERROR_IDS = {
            username: 'usernameError',
            email: 'emailError',
            password: 'passwordError'
        };

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            clearErrors();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            let isValid = true;

            if (!username || username.length < 3) {
                showError('usernameError', 'Tên đăng nhập phải có ít nhất 3 ký tự');
                isValid = false;
            }

            if (!email || !isValidEmail(email)) {
                showError('emailError', 'Vui lòng nhập địa chỉ email hợp lệ');
                isValid = false;
            }

            if (!isValidPassword(password)) {
                showError('passwordError',
                    'Mật khẩu phải có ít nhất 8 ký tự và gồm chữ hoa, chữ thường và chữ số');
                isValid = false;
            }

            if (password !== confirmPassword) {
                showError('confirmPasswordError', 'Mật khẩu xác nhận không khớp');
                isValid = false;
            }

            if (!isValid) return;

            const submitBtn = e.target.querySelector('.btn-register');
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${window.location.origin}/api/authentication/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await readJsonResponse(response);

                if (response.ok && data && (data.success === true || data.Success === true)) {
                    const msg = data.message || data.Message ||
                        'Đăng ký thành công! Đang chuyển sang trang đăng nhập...';
                    document.getElementById('successText').textContent = msg;
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('registerForm').reset();

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    return;
                }

                const { message, fieldErrors } = parseRegisterError(data, response.status);
                applyFieldErrors(fieldErrors);
                showGlobalError(message);
            } catch (error) {
                console.error('Registration error:', error);
                showGlobalError('Không thể kết nối máy chủ. Vui lòng thử lại.');
            } finally {
                submitBtn.disabled = false;
            }
        });

        async function readJsonResponse(response) {
            const text = await response.text();
            if (!text) return null;
            try {
                return JSON.parse(text);
            } catch {
                return null;
            }
        }

        function isValidPassword(password) {
            return typeof password === 'string' && PASSWORD_RULE.test(password);
        }

        function parseRegisterError(data, status) {
            const fieldErrors = {};
            let message = 'Đăng ký thất bại. Vui lòng thử lại.';

            if (status === 429) {
                message = data?.detail || data?.message || data?.Message ||
                    'Quá nhiều lần thử. Vui lòng đợi khoảng 1 phút rồi thử lại.';
                return { message, fieldErrors };
            }

            if (!data) {
                return { message, fieldErrors };
            }

            if (data.errors && typeof data.errors === 'object') {
                for (const [key, messages] of Object.entries(data.errors)) {
                    const text = Array.isArray(messages) ? messages[0] : String(messages);
                    const normalized = key.charAt(0).toLowerCase() + key.slice(1);
                    fieldErrors[normalized] = text;
                }
                const first = Object.values(fieldErrors)[0];
                if (first) {
                    message = first;
                } else if (data.title) {
                    message = data.title;
                }
                return { message, fieldErrors };
            }

            if (data.detail) {
                message = data.detail;
                if (data.errorCode === 'username_exists') {
                    fieldErrors.username = data.detail;
                } else if (data.errorCode === 'email_exists') {
                    fieldErrors.email = data.detail;
                }
                return { message, fieldErrors };
            }

            if (data.message || data.Message) {
                message = data.message || data.Message;
            }

            return { message, fieldErrors };
        }

        function applyFieldErrors(fieldErrors) {
            for (const [field, text] of Object.entries(fieldErrors)) {
                const elementId = FIELD_ERROR_IDS[field];
                if (elementId && text) {
                    showError(elementId, text);
                }
            }
        }

        function showGlobalError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
        }

        function showError(elementId, message) {
            document.getElementById(elementId).textContent = message;
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.textContent = '';
            });
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
    </script>
</body>

</html>
