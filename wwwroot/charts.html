<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích - Smart Farm IoT</title>
    <link rel="stylesheet" href="css/dashboard.css?v=20260306">
    <link rel="stylesheet" href="css/charts.css?v=20260306">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>📊 Phân tích Smart Farm</h1>
        <div class="header-controls">
            <div id="chartsHeader"></div>
        </div>
    </header>

    <main class="analytics-container">
        <div class="filters-section">
            <div class="filter-group">
                <label for="deviceSelect">Chọn thiết bị:</label>
                <select id="deviceSelect">
                    <option value="">Đang tải thiết bị...</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="timeRange">Khoảng thời gian:</label>
                <select id="timeRange">
                    <option value="24">24 giờ gần nhất</option>
                    <option value="72">3 ngày gần nhất</option>
                    <option value="168">7 ngày gần nhất</option>
                    <option value="720">30 ngày gần nhất</option>
                </select>
            </div>

            <div class="filter-group">
                <button id="refreshChartsBtn" class="btn-primary">🔄 Làm mới</button>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-header">
                    <h3>Xu hướng pH</h3>
                    <span class="chart-unit">pH</span>
                </div>
                <canvas id="phChart"></canvas>
                <div id="phStats" class="chart-stats"></div>
            </div>

            <div class="chart-container">
                <div class="chart-header">
                    <h3>Mức TDS (dinh dưỡng)</h3>
                    <span class="chart-unit">ppm</span>
                </div>
                <canvas id="tdsChart"></canvas>
                <div id="tdsStats" class="chart-stats"></div>
            </div>

            <div class="chart-container">
                <div class="chart-header">
                    <h3>Nhiệt độ nước</h3>
                    <span class="chart-unit">°C</span>
                </div>
                <canvas id="tempChart"></canvas>
                <div id="tempStats" class="chart-stats"></div>
            </div>

            <div class="chart-container">
                <div class="chart-header">
                    <h3>Độ ẩm không khí</h3>
                    <span class="chart-unit">%</span>
                </div>
                <canvas id="humidityChart"></canvas>
                <div id="humidityStats" class="chart-stats"></div>
            </div>
        </div>

        <div class="comparison-section">
            <div class="chart-container full-width">
                <div class="chart-header">
                    <h3>Tất cả thông số cảm biến</h3>
                </div>
                <canvas id="allSensorsChart"></canvas>
            </div>
        </div>

        <div class="alerts-section">
            <h2>Cảnh báo và sự kiện gần đây</h2>
            <div id="alertsList" class="alerts-list">
                <p>Đang tải cảnh báo...</p>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
