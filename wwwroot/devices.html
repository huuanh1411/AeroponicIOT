<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý thiết bị - Smart Farm IoT</title>
    <link rel="stylesheet" href="css/devices.css?v=20260306">
</head>
<body>
    <div class="container">
        <div id="devicesHeader"></div>

        <div class="content">
        <!-- Add Device Section -->
        <section class="form-section">
            <h2 class="section-title">Thêm thiết bị mới</h2>
            <form id="addDeviceForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="deviceName">Tên thiết bị:</label>
                        <input type="text" id="deviceName" placeholder="ví dụ: Greenhouse-01" required>
                    </div>
                    <div class="form-group">
                        <label for="macAddress">Địa chỉ MAC:</label>
                        <input type="text" id="macAddress" placeholder="AA:BB:CC:DD:EE:FF" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cropSelect">Gán cây trồng (tùy chọn):</label>
                        <select id="cropSelect">
                            <option value="">Chưa gán cây trồng</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gardenSelect">Gán khu vườn (tùy chọn):</label>
                        <select id="gardenSelect">
                            <option value="">Chưa gán khu vườn</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn-primary">➕ Thêm thiết bị</button>
                    <button type="reset" class="btn-secondary">Xóa nhập</button>
                </div>
            </form>
        </section>

        <section class="form-section">
            <h2 class="section-title">Nhận quyền thiết bị (không cần MAC)</h2>
            <form id="claimDeviceForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="claimCode">Mã nhận quyền từ thiết bị:</label>
                        <input type="text" id="claimCode" placeholder="Ví dụ: A7K9P2" maxlength="16" required>
                    </div>
                    <div class="form-group">
                        <label for="claimDeviceName">Tên thiết bị (tùy chọn):</label>
                        <input type="text" id="claimDeviceName" placeholder="Ví dụ: Greenhouse-Node-01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="claimCropSelect">Gán cây trồng (tùy chọn):</label>
                        <select id="claimCropSelect">
                            <option value="">Chưa gán cây trồng</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="claimGardenSelect">Gán khu vườn (tùy chọn):</label>
                        <select id="claimGardenSelect">
                            <option value="">Chưa gán khu vườn</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn-primary">🔐 Nhận quyền thiết bị</button>
                    <button type="button" class="btn-secondary" id="refreshPendingBtn">Làm mới danh sách chờ</button>
                </div>
            </form>

            <div style="margin-top: 1rem;">
                <h3 style="margin-bottom: 0.5rem;">Thiết bị chờ nhận quyền</h3>
                <div id="pendingDevicesGrid">
                    <p class="loading-text">Đang tải thiết bị chờ...</p>
                </div>
            </div>
        </section>

        <!-- Devices List Section -->
        <section class="devices-section">
            <h2 class="section-title">Thiết bị đang hoạt động</h2>
            <div id="devicesGrid">
                <p class="loading-text">Đang tải thiết bị...</p>
            </div>
        </section>

        <!-- Inactive Devices Section -->
        <section class="devices-section">
            <h2 class="section-title">Thiết bị ngừng hoạt động</h2>
            <div id="inactiveDevicesGrid">
                <p class="loading-text">Đang tải...</p>
            </div>
        </section>
        </div>

        <!-- Edit Device Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    Chỉnh sửa thiết bị
                    <span class="modal-close" onclick="closeEditModal()">&times;</span>
                </div>
                <form id="editDeviceForm">
                    <input type="hidden" id="editDeviceId">
                    <div class="form-group">
                        <label for="editDeviceName">Tên thiết bị:</label>
                        <input type="text" id="editDeviceName" required>
                    </div>
                    <div class="form-group">
                        <label for="editCropSelect">Gán cây trồng:</label>
                        <select id="editCropSelect">
                            <option value="">Chưa gán cây trồng</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editGardenSelect">Gán khu vườn:</label>
                        <select id="editGardenSelect">
                            <option value="">Chưa gán khu vườn</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editStatus">Trạng thái:</label>
                        <select id="editStatus">
                            <option value="Active">Hoạt động</option>
                            <option value="Inactive">Ngừng hoạt động</option>
                            <option value="Maintenance">Bảo trì</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button type="submit" class="btn-primary">💾 Lưu thay đổi</button>
                        <button type="button" class="btn-secondary" onclick="closeEditModal()">Huy</button>
                    </div>
                </form>
            </div>
        </div>

    <script src="js/config.js"></script>
    <script src="js/devices.js"></script>
</body>
</html>
